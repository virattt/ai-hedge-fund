services:
  ollama:
    profiles:
      - embedded-ollama
    image: ollama/ollama:latest
    container_name: ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      # Apple Silicon GPU acceleration
      - METAL_DEVICE=on
      - METAL_DEVICE_INDEX=0
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  hedge-fund:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-hedge-fund
    volumes:
      - ../.env:/app/.env
    command: python src/main.py --ticker AAPL,MSFT,NVDA
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      PYTHONPATH: /app
    tty: true
    stdin_open: true

  hedge-fund-reasoning:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-hedge-fund
    volumes:
      - ../.env:/app/.env
    command: python src/main.py --ticker AAPL,MSFT,NVDA --show-reasoning
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      PYTHONPATH: /app
    tty: true
    stdin_open: true

  hedge-fund-ollama:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-hedge-fund
    volumes:
      - ../.env:/app/.env
    command: python src/main.py --ticker AAPL,MSFT,NVDA --ollama
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      PYTHONPATH: /app
    tty: true
    stdin_open: true

  backtester:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-hedge-fund
    volumes:
      - ../.env:/app/.env
    command: python src/backtester.py --ticker AAPL,MSFT,NVDA
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      PYTHONPATH: /app
    tty: true
    stdin_open: true

  backtester-ollama:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-hedge-fund
    volumes:
      - ../.env:/app/.env
    command: python src/backtester.py --ticker AAPL,MSFT,NVDA --ollama
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      PYTHONPATH: /app
    tty: true
    stdin_open: true

  web-backend:
    profiles:
      - web
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-hedge-fund
    volumes:
      - ../.env:/app/.env
      - web_data:/app/data
    command: >
      sh -c "ln -sfn /app/data/hedge_fund.db /app/app/backend/hedge_fund.db &&
             exec uvicorn app.backend.main:app --host 0.0.0.0 --port 8000"
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    restart: unless-stopped

  web-frontend:
    profiles:
      - web
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    image: ai-hedge-fund-frontend
    ports:
      - "5173:80"
    depends_on:
      - web-backend
    restart: unless-stopped

volumes:
  ollama_data:
  web_data:
