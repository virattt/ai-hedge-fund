services:
  ollama:
    profiles:
      - embedded-ollama
    image: ollama/ollama:latest
    container_name: ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      # Apple Silicon GPU acceleration
      - METAL_DEVICE=on
      - METAL_DEVICE_INDEX=0
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  hedge-fund:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-hedge-fund
    volumes:
      - ../.env:/app/.env
    command: python src/main.py --ticker AAPL,MSFT,NVDA
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      PYTHONPATH: /app
    tty: true
    stdin_open: true

  hedge-fund-reasoning:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-hedge-fund
    volumes:
      - ../.env:/app/.env
    command: python src/main.py --ticker AAPL,MSFT,NVDA --show-reasoning
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      PYTHONPATH: /app
    tty: true
    stdin_open: true

  hedge-fund-ollama:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-hedge-fund
    volumes:
      - ../.env:/app/.env
    command: python src/main.py --ticker AAPL,MSFT,NVDA --ollama
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      PYTHONPATH: /app
    tty: true
    stdin_open: true

  backtester:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-hedge-fund
    volumes:
      - ../.env:/app/.env
    command: python src/backtester.py --ticker AAPL,MSFT,NVDA
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      PYTHONPATH: /app
    tty: true
    stdin_open: true

  backtester-ollama:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-hedge-fund
    volumes:
      - ../.env:/app/.env
    command: python src/backtester.py --ticker AAPL,MSFT,NVDA --ollama
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      PYTHONPATH: /app
    tty: true
    stdin_open: true

  # Health check endpoint (GET /health returns cache freshness, last run, status)
  health-check:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-hedge-fund
    volumes:
      - ../autoresearch/cache:/app/autoresearch/cache
      - ../autoresearch/logs:/app/autoresearch/logs
    working_dir: /app
    command: python -m autoresearch.health_check --port 8765
    ports:
      - "8765:8765"
    environment:
      PYTHONPATH: /app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 5s

  # Autoresearch daily run (for cron: docker compose run autoresearch-daily)
  autoresearch-daily:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-hedge-fund
    volumes:
      - ../.env:/app/.env
      - ../autoresearch/cache:/app/autoresearch/cache
      - ../autoresearch/logs:/app/autoresearch/logs
    working_dir: /app
    command: ./autoresearch/run_daily.sh
    environment:
      PYTHONPATH: /app
      REFRESH_PRICES: "0"
      DRY_RUN: "1"

volumes:
  ollama_data: 
